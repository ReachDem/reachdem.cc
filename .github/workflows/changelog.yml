name: Generate Changelog

on:
  push:
    branches:
      - dev
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## 🧪 Tests",
                  "labels": ["test"]
                },
                {
                  "title": "## 📚 Documentation",
                  "labels": ["documentation", "docs"]
                },
                {
                  "title": "## 🔧 Maintenance",
                  "labels": ["chore", "dependencies"]
                }
              ],
              "template": "## Changes\n\n${{CHANGELOG}}\n\n**Full Changelog**: ${{RELEASE_DIFF}}",
              "pr_template": "- #{{NUMBER}} - #{{TITLE}} by @#{{AUTHOR}}",
              "empty_template": "No changes in this release"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create/Update Changelog file
        run: |
          CHANGELOG_DIR="changelogs"
          mkdir -p $CHANGELOG_DIR
          
          DATE=$(date +%Y-%m-%d)
          BRANCH="${{ github.ref_name }}"
          CHANGELOG_FILE="$CHANGELOG_DIR/CHANGELOG-${BRANCH}-${DATE}.md"
          
          # Create individual changelog
          cat > $CHANGELOG_FILE << EOF
          # Changelog - ${BRANCH} - ${DATE}
          
          ${{ steps.changelog.outputs.changelog }}
          EOF
          
          # Update main CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Prepend new changes to existing changelog
            TEMP_FILE=$(mktemp)
            echo "# Changelog - ${BRANCH}" > $TEMP_FILE
            echo "" >> $TEMP_FILE
            echo "## ${DATE}" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
            echo "${{ steps.changelog.outputs.changelog }}" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
            echo "---" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
            cat CHANGELOG.md >> $TEMP_FILE
            mv $TEMP_FILE CHANGELOG.md
          else
            # Create new changelog
            cat > CHANGELOG.md << EOF
          # Changelog - ${BRANCH}
          
          ## ${DATE}
          
          ${{ steps.changelog.outputs.changelog }}
          EOF
          fi
          
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_ENV
      
      - name: Commit and push changelog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add CHANGELOG.md changelogs/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update changelog for ${{ github.ref_name }} [skip ci]"
            git push
          fi
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            📝 *Changelog Generated*
            
            *Repository:* ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Date:* $(date +%Y-%m-%d)
            
            A new changelog has been generated and committed to the repository.
            
            [View Repository](${{ github.server_url }}/${{ github.repository }})
